# Trust boundary: public traffic reaches this container only through cloudflared.
# The host publish is loopback-only, and only the app/edge/connector join the
# dedicated Docker network. Cloudflare overwrites CF-Connecting-IP at the edge.
map $http_cf_connecting_ip $stock_client_ip {
  default $http_cf_connecting_ip;
  "" $remote_addr;
}

limit_req_zone $binary_remote_addr zone=stock_connector:10m rate=6000r/m;
limit_req_zone $stock_client_ip zone=stock_client:10m rate=300r/m;

server {
  listen 80;
  server_name stock.jigooo.com localhost;

  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  include /etc/nginx/snippets/stock-security-headers.conf;

  resolver 127.0.0.11 valid=10s ipv6=off;
  set $stock_insight_upstream stock-insight-app:3000;

  location = /__edge_health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    limit_req zone=stock_connector burst=1000 nodelay;
    limit_req zone=stock_client burst=100 nodelay;
    limit_req_status 429;

    include /etc/nginx/snippets/stock-security-headers.conf;
    proxy_hide_header Cache-Control;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, no-transform" always;
    add_header CDN-Cache-Control "no-store" always;
    add_header Cloudflare-CDN-Cache-Control "no-store" always;

    proxy_pass http://$stock_insight_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $stock_client_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Stock-Client-IP $stock_client_ip;
    proxy_set_header Authorization "";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    client_max_body_size 1m;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
