# Post-enrollment production runtime. Static credentials and the enrollment verifier are intentionally absent.
name: stock-insight

services:
  api:
    image: sha256:f207a1c18c116d6e4c08c565da710ece5fa8444686953c072bfb1969da0fd6cd
    pull_policy: never
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: '6200'
      DATABASE_READ_URL: ${STOCK_INSIGHT_DATABASE_READ_URL:?set in .env.docker}
      # Multi-user: no fixed server-owned id. The api-server verifies a signed
      # per-request internal context and refuses to boot without the secret.
      STOCK_INSIGHT_INTERNAL_CONTEXT_SECRET_FILE: /run/secrets/stock-insight-internal-context
    secrets:
      - stock-insight-internal-context
    ports:
      - '127.0.0.1:8093:6200'
    networks:
      - research
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:6200/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 4s
      retries: 8
      start_period: 15s
    restart: unless-stopped

  app:
    image: sha256:ba69de3a275b097055f939fb3263821aac3fed8e9837c822f183301403d5f4d8
    pull_policy: never
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: '3000'
      STOCK_INSIGHT_MUTATIONS_ENABLED: 'true'
      DATABASE_READ_URL: ${STOCK_INSIGHT_DATABASE_READ_URL:?set in .env.docker}
      DATABASE_WRITE_URL: ${STOCK_INSIGHT_DATABASE_WRITE_URL:?set in .env.docker}
      # Multi-user: signup mints users via invitation codes; no fixed user id.
      STOCK_INSIGHT_SIGNUP_ENABLED: ${STOCK_INSIGHT_SIGNUP_ENABLED:-true}
      STOCK_INSIGHT_SESSION_SECRET_FILE: /run/secrets/stock-insight-session-secret
      STOCK_INSIGHT_APP_ORIGIN: ${STOCK_INSIGHT_APP_ORIGIN:?set in .env.docker}
      STOCK_INSIGHT_SESSION_TTL_SECONDS: ${STOCK_INSIGHT_SESSION_TTL_SECONDS:-28800}
    secrets:
      - stock-insight-session-secret
    ports:
      - '127.0.0.1:8091:3000'
    networks:
      edge:
        aliases:
          - stock-insight-app
      research:
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 4s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 15s

secrets:
  stock-insight-session-secret:
    file: ${STOCK_INSIGHT_SESSION_SECRET_HOST_PATH:?set in .env.docker}
  stock-insight-internal-context:
    file: ${STOCK_INSIGHT_INTERNAL_CONTEXT_SECRET_HOST_PATH:?set in .env.docker}

networks:
  edge:
    external: true
    name: stock-insight-edge
  research:
    external: true
    name: research-app-db_default
