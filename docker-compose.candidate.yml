# Isolated release-candidate overlay.
# Run with --project-name stock-insight-candidate and --no-build.
services:
  app:
    image: ${STOCK_INSIGHT_CANDIDATE_IMAGE:?set immutable candidate image tag}
    environment:
      STOCK_INSIGHT_APP_ORIGIN: ${STOCK_INSIGHT_CANDIDATE_ORIGIN:-http://127.0.0.1:8092}
      STOCK_INSIGHT_MUTATIONS_ENABLED: ${STOCK_INSIGHT_CANDIDATE_MUTATIONS_ENABLED:-false}
      STOCK_INSIGHT_AUTH_USERNAME: ${STOCK_INSIGHT_CANDIDATE_AUTH_USERNAME:-candidate-e2e}
      STOCK_INSIGHT_AUTH_ENROLLMENT_TOKEN_HASH_FILE: /run/secrets/stock-insight-auth-enrollment-token-hash
      # Enrollment E2E uses isolated candidate-only reader/writer roles and never production data.
      DATABASE_READ_URL: ${STOCK_INSIGHT_CANDIDATE_DATABASE_READ_URL:?set a candidate reader DSN}
      DATABASE_WRITE_URL: ${STOCK_INSIGHT_CANDIDATE_DATABASE_WRITE_URL:?set a candidate writer DSN}
    ports: !override
      - '127.0.0.1:8092:3000'
    # Never join the production edge or research networks.
    networks: !override
      - candidate
    restart: 'no'

secrets:
  stock-insight-auth-password-record:
    file: ${STOCK_INSIGHT_CANDIDATE_AUTH_PASSWORD_RECORD_HOST_PATH:?set a candidate-only password record}
  stock-insight-auth-enrollment-token-hash:
    file: ${STOCK_INSIGHT_CANDIDATE_AUTH_ENROLLMENT_TOKEN_HASH_HOST_PATH:?set a candidate-only enrollment hash}
  stock-insight-session-secret:
    file: ${STOCK_INSIGHT_CANDIDATE_SESSION_SECRET_HOST_PATH:?set a candidate-only session secret}

networks:
  candidate:
    external: true
    name: ${STOCK_INSIGHT_CANDIDATE_NETWORK:?set a candidate-only Docker network}
