name: stock-insight

services:
  api:
    image: ${STOCK_INSIGHT_API_IMAGE:-sha256:b9902487af4e2cded3d87b3eafcdef7bb8f4a206e4d6d7adf5028d2c21f6ec81}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: '6200'
      DATABASE_READ_URL: ${STOCK_INSIGHT_DATABASE_READ_URL:?set in .env.docker}
      STOCK_INSIGHT_USER_ID: ${STOCK_INSIGHT_USER_ID:?set in .env.docker}
    ports:
      - '127.0.0.1:8093:6200'
    networks:
      - research
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:6200/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 4s
      retries: 8
      start_period: 15s
    restart: unless-stopped

  app:
    image: ${STOCK_INSIGHT_APP_IMAGE:-sha256:f7eebfb9f9e80bb18a8361caf6d3c55ff11c7e46decb0255732e7c0cc2040ce9}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: '3000'
      STOCK_INSIGHT_MUTATIONS_ENABLED: 'true'
      DATABASE_READ_URL: ${STOCK_INSIGHT_DATABASE_READ_URL:?set in .env.docker}
      DATABASE_WRITE_URL: ${STOCK_INSIGHT_DATABASE_WRITE_URL:?set in .env.docker}
      STOCK_INSIGHT_USER_ID: ${STOCK_INSIGHT_USER_ID:?set in .env.docker}
      STOCK_INSIGHT_AUTH_USERNAME: ${STOCK_INSIGHT_AUTH_USERNAME:?set in .env.docker}
      STOCK_INSIGHT_AUTH_PASSWORD_RECORD_FILE: /run/secrets/stock-insight-auth-password-record
      STOCK_INSIGHT_AUTH_ENROLLMENT_TOKEN_HASH_FILE: /run/secrets/stock-insight-auth-enrollment-token-hash
      STOCK_INSIGHT_SESSION_SECRET_FILE: /run/secrets/stock-insight-session-secret
      STOCK_INSIGHT_APP_ORIGIN: ${STOCK_INSIGHT_APP_ORIGIN:?set in .env.docker}
      STOCK_INSIGHT_SESSION_TTL_SECONDS: ${STOCK_INSIGHT_SESSION_TTL_SECONDS:-28800}
    secrets:
      - stock-insight-auth-password-record
      - stock-insight-auth-enrollment-token-hash
      - stock-insight-session-secret
    ports:
      - '127.0.0.1:8091:3000'
    networks:
      edge:
        aliases:
          - stock-insight-app
      research:
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 4s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 15s

secrets:
  stock-insight-auth-password-record:
    file: ${STOCK_INSIGHT_AUTH_PASSWORD_RECORD_HOST_PATH:?set in .env.docker}
  stock-insight-auth-enrollment-token-hash:
    file: ${STOCK_INSIGHT_AUTH_ENROLLMENT_TOKEN_HASH_HOST_PATH:?set in .env.docker}
  stock-insight-session-secret:
    file: ${STOCK_INSIGHT_SESSION_SECRET_HOST_PATH:?set in .env.docker}

networks:
  edge:
    external: true
    name: stock-insight-edge
  research:
    external: true
    name: research-app-db_default
